name: Bug report
description: Report a sanitized reproducible failure
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never upload keys, data.key, SQLite, auth files, full configuration, or raw request logs.
  - type: input
    id: version
    attributes:
      label: Updater version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows and PowerShell versions
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and sanitized result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
